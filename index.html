<div class="flex justify-center px-8 pb-8">

        <h2 class="text-lg font-bold mb-4 dark:text-white" style="font-family: 'syne', sans-serif;">
          Get in touch
        </h2>

        <form action="https://formspree.io/f/meevwgbd" method="POST">

          <input
          type="text"
          name="name"
          placeholder="Your name"
          class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm mb-3 outline-none focus:border-blue-400"
          />

          type="email"
          name="email"
          placeholder="Your email"
          class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm mb-3 outline-none focus:border-blue-400"
          />

          <textarea
          name="message"
          placeholder="Your message"
          rows="4"
          class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm mb-3 outline-none focus:border-blue-400 resize-none"
          ></textarea>

          <button
          type="submit"
